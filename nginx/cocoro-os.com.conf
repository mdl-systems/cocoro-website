# ─────────────────────────────────────────────────────────────────────────────
# nginx/cocoro-os.com.conf
# さくらインターネット VPS 向け nginx リバースプロキシ設定
#
# インストール手順（サーバー上で実行）:
#   sudo cp nginx/cocoro-os.com.conf /etc/nginx/sites-available/cocoro-os.com
#   sudo ln -s /etc/nginx/sites-available/cocoro-os.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL証明書取得（Let's Encrypt）:
#   sudo certbot --nginx -d cocoro-os.com -d www.cocoro-os.com
# ─────────────────────────────────────────────────────────────────────────────

# HTTP → HTTPS リダイレクト
server {
    listen 80;
    listen [::]:80;
    server_name cocoro-os.com www.cocoro-os.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # All other traffic → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS メインサーバー
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cocoro-os.com www.cocoro-os.com;

    # ─── SSL (Let's Encrypt by certbot) ──────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/cocoro-os.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cocoro-os.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Security Headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ─── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/rss+xml
               application/atom+xml image/svg+xml;

    # ─── Static Files (Next.js _next/static) ─────────────────────────────────
    # Served directly by nginx for performance (bypass Node.js)
    location /_next/static/ {
        alias /var/www/cocoro-website/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Public Assets ────────────────────────────────────────────────────────
    location /public/ {
        alias /var/www/cocoro-website/public/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # OGP image & favicon — long cache
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff2|woff|ttf)$ {
        root /var/www/cocoro-website/public;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
        try_files $uri @nextjs;
    }

    # ─── Next.js App (Reverse Proxy to PM2 / Node.js) ────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # Buffer
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # ─── SSE (Server-Sent Events) — disable buffering ────────────────────────
    location /api/chat {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE requires no buffering
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;

        add_header Cache-Control "no-cache";
        add_header X-Accel-Buffering "no";
    }

    # ─── Named location for fallback ─────────────────────────────────────────
    location @nextjs {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/cocoro-os.com-access.log;
    error_log  /var/log/nginx/cocoro-os.com-error.log;
}
