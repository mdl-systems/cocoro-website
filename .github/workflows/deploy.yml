name: Deploy to Sakura

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to さくら
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ─── 1. チェックアウト ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─── 2. Node.js セットアップ ────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ─── 3. 依存関係インストール ─────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ─── 4. 静的ビルド ───────────────────────────────────────────────────
      # NEXT_PUBLIC_API_URL は公開サーバーのURL（LAN IPは外部から不達なので注意）
      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://cocoro-os.com
          NEXT_TELEMETRY_DISABLED: 1

      # ─── 5. .htaccess 配置 ───────────────────────────────────────────────
      - name: Place .htaccess
        run: cp scripts/.htaccess out/.htaccess

      # ─── 6. SSH Agent セットアップ ──────────────────────────────────────
      # GitHub Secrets 登録方法:
      #   cat ~/.ssh/id_ed25519  → SAKURA_SSH_PRIVATE_KEY に秘密鍵をそのまま登録
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SAKURA_SSH_PRIVATE_KEY }}

      # ─── 7. known_hosts 登録 ────────────────────────────────────────────
      - name: Add known hosts
        run: ssh-keyscan -H www3398.sakura.ne.jp >> ~/.ssh/known_hosts

      # ─── 8. リモートディレクトリ作成 ────────────────────────────────────
      - name: Ensure remote directory
        run: |
          ssh \
            -o ConnectTimeout=30 \
            mdl-japan@www3398.sakura.ne.jp \
            'mkdir -p ~/www/cocoro-os && echo "DIR_OK: $(ls ~/www/cocoro-os | wc -l) files"'

      # ─── 9. rsync デプロイ ───────────────────────────────────────────────
      - name: Deploy via rsync
        id: rsync
        continue-on-error: true
        run: |
          rsync -avz --delete \
            -e "ssh -o ConnectTimeout=30" \
            --exclude ".DS_Store" \
            --checksum \
            out/ \
            mdl-japan@www3398.sakura.ne.jp:~/www/cocoro-os/
        timeout-minutes: 10

      # rsync 失敗時は tar+scp フォールバック
      - name: Deploy via scp (fallback)
        if: steps.rsync.outcome == 'failure'
        run: |
          echo "⚠ rsync failed, falling back to scp..."
          tar -czf /tmp/cocoro-deploy.tar.gz -C out .
          scp \
            -o ConnectTimeout=30 \
            /tmp/cocoro-deploy.tar.gz \
            mdl-japan@www3398.sakura.ne.jp:~/
          ssh \
            -o ConnectTimeout=30 \
            mdl-japan@www3398.sakura.ne.jp \
            'cd ~/www/cocoro-os && tar -xzf ~/cocoro-deploy.tar.gz --overwrite && rm ~/cocoro-deploy.tar.gz && echo "SCP_DEPLOY_OK"'


      # ─── 10. デプロイ完了サマリー ─────────────────────────────────────
      - name: Deployment summary
        run: |
          FILE_COUNT=$(find out -type f | wc -l)
          echo "## ✦ Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | https://cocoro-os.com |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Files** | ${FILE_COUNT} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
