name: Deploy to Sakura

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to さくら
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://cocoro-os.com
          NEXT_TELEMETRY_DISABLED: 1

      - name: Place .htaccess
        run: cp scripts/.htaccess out/.htaccess

      - name: Setup SSH
        env:
          SAKURA_SSH_PRIVATE_KEY: ${{ secrets.SAKURA_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SAKURA_SSH_PRIVATE_KEY" > ~/.ssh/sakura_actions
          chmod 600 ~/.ssh/sakura_actions
          ssh-keyscan -H www3398.sakura.ne.jp >> ~/.ssh/known_hosts
          ssh-keygen -l -f ~/.ssh/sakura_actions

      - name: Ensure remote directory
        run: |
          ssh -i ~/.ssh/sakura_actions \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            mdl-japan@www3398.sakura.ne.jp \
            'mkdir -p ~/www/cocoro-os && echo "DIR_OK"'

      - name: Deploy via rsync
        id: rsync
        continue-on-error: true
        timeout-minutes: 10
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/sakura_actions -o StrictHostKeyChecking=no -o ConnectTimeout=30" \
            --exclude ".DS_Store" \
            out/ \
            mdl-japan@www3398.sakura.ne.jp:~/www/cocoro-os/

      - name: Deploy via scp (fallback)
        if: steps.rsync.outcome == 'failure'
        run: |
          echo "rsync failed, falling back to scp..."
          tar -czf /tmp/deploy.tar.gz -C out .
          scp -i ~/.ssh/sakura_actions \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            /tmp/deploy.tar.gz \
            mdl-japan@www3398.sakura.ne.jp:~/
          ssh -i ~/.ssh/sakura_actions \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            mdl-japan@www3398.sakura.ne.jp \
            'cd ~/www/cocoro-os && tar -xzf ~/deploy.tar.gz --overwrite && rm ~/deploy.tar.gz && echo "SCP_OK"'

      - name: Deployment summary
        run: |
          echo "## ✦ Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | https://cocoro-os.com |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
